<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Trades</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap');
  :root {
    --bg: #fff; --card: #fafafa; --fg: #1a1a1a; --muted: #888; --border: #e0e0e0;
    --green: #16a34a; --green-bg: rgba(22,163,74,0.08); --red: #dc2626; --red-bg: rgba(220,38,38,0.08);
    --blue: #2563eb; --yellow: #ca8a04;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111; --card: #1a1a1a; --fg: #e2e8f0; --muted: #888; --border: #2a2a2a;
      --green: #4ade80; --green-bg: rgba(74,222,128,0.08); --red: #f87171; --red-bg: rgba(248,113,113,0.08);
      --blue: #60a5fa; --yellow: #fbbf24;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--fg); font-family: 'JetBrains Mono', monospace; font-size: 13px; padding: 12px 16px; max-width: 900px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .title { font-size: 14px; font-weight: 800; letter-spacing: 0.1em; }
  .count { font-size: 12px; color: var(--muted); margin-left: 8px; }
  .btn { font-size: 11px; font-family: inherit; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; cursor: pointer; }
  .btn:hover { color: var(--fg); border-color: var(--muted); }
  .settings { border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin-bottom: 10px; font-size: 12px; display: none; }
  .settings-row { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
  .settings-row:last-child { margin-bottom: 0; }
  .inp { background: var(--card); border: 1px solid var(--border); border-radius: 4px; color: var(--fg); padding: 4px 8px; font-size: 11px; font-family: inherit; flex: 1; }
  .cards { display: flex; flex-direction: column; gap: 8px; }
  .empty { color: var(--muted); text-align: center; padding: 30px; font-size: 13px; }
  .card { border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; background: var(--card); }
  .card.long { border-left: 3px solid var(--green); }
  .card.short { border-left: 3px solid var(--red); }
  .card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .card-asset { font-size: 16px; font-weight: 800; }
  .card-dir { font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 3px; }
  .card-dir.long { color: var(--green); background: var(--green-bg); }
  .card-dir.short { color: var(--red); background: var(--red-bg); }
  .card-conv { font-size: 12px; font-weight: 700; }
  .card-mode { font-size: 11px; color: var(--muted); margin-left: auto; }
  .card-time { font-size: 11px; color: var(--muted); }
  .card-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .card-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .card-val { font-size: 13px; font-weight: 600; }
  .card-targets { display: flex; gap: 16px; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }
  .tp-label { font-size: 10px; color: var(--muted); }
  .tp-val { font-size: 12px; font-weight: 600; }
  .tp-rr { font-size: 11px; font-weight: 700; margin-left: 4px; }
  .tp-rr.good { color: var(--green); }
  .tp-rr.ok { color: var(--yellow); }
  .tp-rr.bad { color: var(--red); }
  .card-ctx { margin-top: 6px; display: flex; gap: 6px; flex-wrap: wrap; }
  .ctx-tag { font-size: 10px; padding: 2px 8px; border: 1px solid var(--border); border-radius: 10px; color: var(--muted); background: var(--bg); }
  .results { margin-top: 16px; border-top: 2px solid var(--border); padding-top: 12px; }
  .results-title { font-size: 13px; font-weight: 800; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 6px; margin-bottom: 10px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-val { font-size: 16px; font-weight: 800; margin-top: 2px; }
  .closed-list { display: flex; flex-direction: column; gap: 4px; }
  .closed-row { display: grid; grid-template-columns: 50px 50px 60px 80px 60px 60px 70px; gap: 8px; align-items: center; font-size: 11px; padding: 4px 8px; border-radius: 4px; }
  .closed-row.header { color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); }
  .closed-row.win { background: var(--green-bg); }
  .closed-row.loss { background: var(--red-bg); }
  .close-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .close-inp { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--fg); padding: 4px 8px; font-size: 12px; font-family: inherit; width: 100px; }
  .close-sel { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--fg); padding: 4px 6px; font-size: 11px; font-family: inherit; }
  .close-btn { font-size: 11px; font-family: inherit; color: #fff; background: var(--red); border: none; border-radius: 4px; padding: 4px 12px; cursor: pointer; font-weight: 700; }
  .close-btn:hover { opacity: 0.8; }
  .close-msg { font-size: 11px; font-weight: 600; }
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center">
    <span class="title">OPEN TRADES</span>
    <span class="count" id="count"></span>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn" onclick="loadTrades()">↻ Refresh</button>
    <button class="btn" onclick="toggleSettings()">⚙</button>
  </div>
</div>
<div class="settings" id="settingsPanel">
  <div class="settings-row"><span>Worker</span><input class="inp" id="cfg_worker" placeholder="https://worker.dev"></div>
  <div class="settings-row"><span>Token</span><input class="inp" id="cfg_token" type="password" placeholder="secret_..."><button class="btn" onclick="saveCfg();loadTrades()">Save</button></div>
</div>
<div class="cards" id="cards"></div>
<div class="results" id="results"></div>
<script>
const DB_ID = "24933910ce304b65a1f50b137d7392ae";
function toggleSettings() {
  const p = document.getElementById("settingsPanel");
  p.style.display = p.style.display === "none" ? "block" : "none";
  document.getElementById("cfg_worker").value = localStorage.getItem("tc_worker") || "";
  document.getElementById("cfg_token").value = localStorage.getItem("tc_token") || "";
}
function saveCfg() {
  localStorage.setItem("tc_worker", document.getElementById("cfg_worker").value);
  localStorage.setItem("tc_token", document.getElementById("cfg_token").value);
}
async function loadTrades() {
  const worker = localStorage.getItem("tc_worker");
  const token = localStorage.getItem("tc_token");
  if (!worker || !token) { toggleSettings(); return; }
  document.getElementById("cards").innerHTML = '<div class="empty">Loading...</div>';
  try {
    const resp = await fetch(worker, { method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ action: "read", token, database_id: DB_ID, page_size: 50 }) });
    const data = await resp.json();
    const all = data.results || [];
    const open = all.filter(t => (t["Exit Price"] == null) && !t["Exit Reason"]);
    const closed = all.filter(t => t["Exit Price"] != null && t["Exit Price"] !== "");
    document.getElementById("count").textContent = open.length ? open.length + " open" : "";
    if (!open.length) { document.getElementById("cards").innerHTML = '<div class="empty">No open trades</div>'; }
    else { document.getElementById("cards").innerHTML = open.map(t => {
      const dir = (t.Direction || "").toLowerCase();
      const entry = t["Entry Price"], stop = t["Stop Price"];
      const risk = (entry && stop) ? Math.abs(entry - stop) : 0;
      const opened = t.Date ? new Date(t.Date) : null;
      let elapsed = "";
      if (opened) { const d = Date.now() - opened.getTime(); const h = Math.floor(d/3600000); const m = Math.floor((d%3600000)/60000); elapsed = h > 0 ? h+"h "+m+"m" : m+"m"; }
      function rr(tp) { if (!tp || !risk) return ""; const r = (Math.abs(tp - entry) / risk).toFixed(1); return '<span class="tp-rr '+(r>=2?"good":r>=1?"ok":"bad")+'">1:'+r+'</span>'; }
      const tags = [t["HTF Bias"]?"HTF:"+t["HTF Bias"]:"", t["Market State"]?"MS:"+t["Market State"]:"", t["OI Confirm"]?"OI:"+t["OI Confirm"]:"", t["Funding Check"]&&t["Funding Check"]!=="OK"?"F:"+t["Funding Check"]:"", t.Session, t.Trigger].filter(Boolean);
      const modeColor = t.Mode === "Live" ? "var(--green)" : "var(--muted)";
      const skippedBadge = t.Skipped ? '<span style="font-size:10px;padding:1px 7px;border-radius:8px;border:1px solid var(--yellow,#ca8a04);color:var(--yellow,#ca8a04);margin-left:4px">⏭ Skipped</span>' : '';
      const defaultExit = t.TP1 || "";
      return '<div class="card '+dir+'">' +
        '<div class="card-top"><span class="card-asset">'+(t.Asset||"?")+'</span><span class="card-dir '+dir+'">'+(t.Direction||"")+'</span><span class="card-conv">'+(t.Conviction||"")+'</span><span class="card-mode">'+(t["Trade Mode"]||"")+'</span>' +
        '<span style="font-size:10px;padding:1px 7px;border-radius:8px;border:1px solid '+modeColor+';color:'+modeColor+';margin-left:4px">'+(t.Mode||"Live")+'</span>' +
        skippedBadge +
        '<span class="card-time">'+(elapsed?"⏱ "+elapsed:"")+'</span></div>' +
        '<div class="card-grid"><div><div class="card-label">Entry</div><div class="card-val">'+(entry!=null?entry:"—")+'</div></div><div><div class="card-label">Stop</div><div class="card-val" style="color:var(--red)">'+(stop!=null?stop:"—")+'</div></div><div><div class="card-label">Risk</div><div class="card-val">'+(t["Risk %"]!=null?t["Risk %"]+"%":"—")+'</div></div></div>' +
        '<div class="card-targets">'+(t.TP1?'<div><span class="tp-label">TP1</span> <span class="tp-val">'+t.TP1+'</span>'+rr(t.TP1)+'</div>':'')+(t.TP2?'<div><span class="tp-label">TP2</span> <span class="tp-val">'+t.TP2+'</span>'+rr(t.TP2)+'</div>':'')+(t.TP3?'<div><span class="tp-label">TP3</span> <span class="tp-val">'+t.TP3+'</span>'+rr(t.TP3)+'</div>':'')+'</div>' +
        (tags.length?'<div class="card-ctx">'+tags.map(c=>'<span class="ctx-tag">'+c+'</span>').join("")+'</div>':'') +
        (t.Notes?'<div style="font-size:11px;color:var(--muted);padding:4px 8px;border-top:1px solid var(--border);width:100%;box-sizing:border-box">📝 '+t.Notes+'</div>':'') +
        '<div class="close-row">' +
          '<span style="font-size:10px;color:var(--muted)">CLOSE:</span>' +
          '<input class="close-inp" id="exit_'+t.id+'" placeholder="Exit Price" type="number" value="'+defaultExit+'">' +
          '<select class="close-sel" id="reason_'+t.id+'"><option value="">Reason</option><option selected>TP1</option><option>TP2</option><option>TP3</option><option>Stop</option><option>Time Stop</option><option>Manual</option><option>BE</option></select>' +
          '<button class="close-btn" onclick="closeTrade(\''+t.id+'\')">Close Trade</button>' +
          '<span class="close-msg" id="msg_'+t.id+'"></span>' +
        '</div>' +
        '<div style="padding:4px 8px;padding-bottom:6px"><input class="close-inp" id="lesson_'+t.id+'" placeholder="Lessons..." style="width:100%;box-sizing:border-box"></div>' +
      '</div>';
    }).join(""); }
    // Results section
    renderResults(all, closed);
  } catch(e) { document.getElementById("cards").innerHTML = '<div class="empty">Error: '+e.message+'</div>'; }
}
function renderResults(all, closed) {
  if (!all.length) { document.getElementById("results").innerHTML = ""; return; }
  function pnlOf(t) { const v = parseFloat(t["PnL R"]); return isNaN(v) ? 0 : v; }
  const wins = closed.filter(t => pnlOf(t) > 0);
  const losses = closed.filter(t => pnlOf(t) < 0);
  const be = closed.filter(t => pnlOf(t) === 0);
  const totalR = closed.reduce((s, t) => s + pnlOf(t), 0);
  const wr = closed.length ? Math.round(wins.length / closed.length * 100) : 0;
  const avgWin = wins.length ? (wins.reduce((s,t) => s + pnlOf(t), 0) / wins.length).toFixed(1) : "—";
  const avgLoss = losses.length ? (losses.reduce((s,t) => s + pnlOf(t), 0) / losses.length).toFixed(1) : "—";
  const clr = v => v >= 0 ? "var(--green)" : "var(--red)";
  let html = '<div class="results-title">RESULTS</div>';
  html += '<div class="stats-grid">';
  html += '<div class="stat-card"><div class="stat-label">Trades</div><div class="stat-val">'+all.length+'</div></div>';
  html += '<div class="stat-card"><div class="stat-label">Closed</div><div class="stat-val">'+closed.length+'</div></div>';
  html += '<div class="stat-card"><div class="stat-label">Win Rate</div><div class="stat-val" style="color:'+clr(wr-50)+'">'+wr+'%</div></div>';
  html += '<div class="stat-card"><div class="stat-label">Total PnL</div><div class="stat-val" style="color:'+clr(totalR)+'">'+(totalR>=0?"+":"")+totalR.toFixed(1)+'R</div></div>';
  html += '<div class="stat-card"><div class="stat-label">W / L / BE</div><div class="stat-val"><span style="color:var(--green)">'+wins.length+'</span> / <span style="color:var(--red)">'+losses.length+'</span> / '+be.length+'</div></div>';
  html += '<div class="stat-card"><div class="stat-label">Avg Win / Loss</div><div class="stat-val"><span style="color:var(--green)">'+avgWin+'R</span> / <span style="color:var(--red)">'+avgLoss+'R</span></div></div>';
  html += '</div>';
  if (closed.length) {
    html += '<div class="closed-list">';
    html += '<div class="closed-row header"><span>ID</span><span>Asset</span><span>Dir</span><span>Conviction</span><span>PnL R</span><span>Exit</span><span>Date</span></div>';
    closed.sort((a,b) => (b.Date||"").localeCompare(a.Date||"")).forEach(t => {
      const pnl = pnlOf(t); const cls = pnl > 0 ? "win" : pnl < 0 ? "loss" : "";
      html += '<div class="closed-row '+cls+'"><span>'+(t["Trade ID"]||"")+'</span><span>'+(t.Asset||"")+'</span><span>'+(t.Direction||"")+'</span><span>'+(t.Conviction||"")+'</span><span style="font-weight:700">'+(pnl>=0?"+":"")+pnl.toFixed(1)+'R</span><span>'+(t["Exit Reason"]||"")+'</span><span>'+(t.Date?t.Date.slice(5,10):"")+'</span></div>';
    });
    html += '</div>';
  }
  document.getElementById("results").innerHTML = html;
}
async function closeTrade(pageId) {
  const exitPrice = parseFloat(document.getElementById("exit_"+pageId)?.value);
  const reason = document.getElementById("reason_"+pageId)?.value;
  const lesson = document.getElementById("lesson_"+pageId)?.value || "";
  const msgEl = document.getElementById("msg_"+pageId);
  if (!exitPrice || isNaN(exitPrice)) { msgEl.textContent = "Enter Exit Price"; msgEl.style.color = "var(--red)"; return; }
  if (!reason) { msgEl.textContent = "Select Reason"; msgEl.style.color = "var(--red)"; return; }
  const worker = localStorage.getItem("tc_worker");
  const token = localStorage.getItem("tc_token");
  msgEl.textContent = "Saving..."; msgEl.style.color = "var(--muted)";
  try {
    const props = { "Exit Price": exitPrice, "Exit Reason": reason };
    if (lesson) props["Lessons"] = lesson;
    const resp = await fetch(worker, { method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ action: "update", token, page_id: pageId, properties: props }) });
    const data = await resp.json();
    if (data.message) { msgEl.textContent = data.message; msgEl.style.color = "var(--red)"; }
    else { msgEl.textContent = "✅ Closed!"; msgEl.style.color = "var(--green)"; setTimeout(loadTrades, 1500); }
  } catch(e) { msgEl.textContent = e.message; msgEl.style.color = "var(--red)"; }
}
loadTrades();
setInterval(loadTrades, 300000);
</script>
</body>
</html>
